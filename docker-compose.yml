services:
  db:
    image: mysql:8.0
    container_name: zeroboom-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASS:-rootpassword}
      MYSQL_DATABASE: ${DATABASE_NAME:-mydb}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - ./docker/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zeroboom-redis
    restart: unless-stopped
    # 순수 캐시: 영속화 off(--save "" / appendonly no), 64MB 캡 + TTL 키 우선 제거.
    # 포트 미공개 → 도커 네트워크 내부에서 zeroboom-redis 로만 접근(외부 노출 없음).
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - volatile-ttl

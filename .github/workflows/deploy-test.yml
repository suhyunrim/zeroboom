name: 테스트 환경 배포

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 테스트 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.PROJECT_DIR_TEST }}
            git pull origin master
            docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.override.yml build --no-cache app-test
            docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.override.yml up -d --no-deps app-test
            docker image prune -f

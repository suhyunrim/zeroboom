# 테스트 환경: 라이브 DB를 공유하는 app-test 서비스
# 실행: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --no-deps app-test

services:
  app-test:
    container_name: zeroboom-bot-test
    build: .
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      SERVICE_PORT: 3001
      DATABASE_HOST: zeroboom-db
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME_TEST:-zeroboom_bot_test}
      DATABASE_USER: ${DATABASE_USER:-zeroboom}
      DATABASE_PASS: ${DATABASE_PASS:-zeroboompass}
      RIOT_API_KEY: ${RIOT_API_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN_TEST:-${DISCORD_BOT_TOKEN}}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID_TEST:-${DISCORD_APPLICATION_ID}}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
      COMMAND_PREFIX: ${COMMAND_PREFIX:-}
      FRONTEND_URL: ${FRONTEND_URL_TEST:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      PICK_COUNT: ${PICK_COUNT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5}
      AI_MAX_ROUNDS: ${AI_MAX_ROUNDS:-5}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-30}
      DATABASE_AI_RO_USER: ${DATABASE_AI_RO_USER:-}
      DATABASE_AI_RO_PASS: ${DATABASE_AI_RO_PASS:-}
      REDIS_HOST: zeroboom-redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      ELISE_UPDATES_DIR: /data/elise-updates
    volumes:
      # elise 자동 업데이트 피드 (latest.yml + setup exe) — 호스트에 파일만 올리면 배포와 무관하게 유지
      - /home/ubuntu/elise-updates-test:/data/elise-updates:ro
    networks:
      - live_network

networks:
  live_network:
    external: true
    name: zeroboom-live_default
